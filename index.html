<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split-Flap Airport Display</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        #root {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .empty-state {
            text-align: center;
            font-size: 1.5rem;
            color: #666666;
            font-family: 'Courier New', monospace;
        }

        .flight-row {
            display: flex;
            align-items: center;
            gap: 20px;
            border-top: 2px solid #FFFFFF;
            border-bottom: 2px solid #FFFFFF;
            padding: 20px 30px;
            background-color: rgba(255, 255, 255, 0.02);
        }

        .plane-icon {
            flex-shrink: 0;
            width: 24px;
            height: 24px;
        }

        .plane-icon svg {
            width: 100%;
            height: 100%;
            transition: transform 0.3s ease-out;
        }

        .segment {
            display: inline-block;
            min-width: 80px;
            text-align: center;
            font-family: 'Courier New', monospace;
            font-size: 2rem;
            font-weight: bold;
            color: #FFFFFF;
            padding: 0 8px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .segment.flipping {
            transform: rotateX(90deg);
            transform-style: preserve-3d;
        }

        .data-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 100px;
        }

        .data-label-text {
            font-size: 0.8rem;
            color: #999999;
            margin-bottom: 5px;
        }

        .data-label-unit {
            font-size: 0.7rem;
            color: #666666;
            margin-top: 5px;
        }

        .button-group {
            margin-top: 60px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 0;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn-add {
            background-color: #FFFFFF;
            color: #000000;
        }

        .btn-add:hover {
            background-color: #CCCCCC;
        }

        .btn-clear {
            background-color: #333333;
            color: #FFFFFF;
            border: 1px solid #FFFFFF;
        }

        .btn-clear:hover {
            background-color: #555555;
        }

        .instructions {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #666666;
            font-family: monospace;
            text-align: center;
            max-width: 600px;
        }

        .instructions p {
            margin: 5px 0;
        }

        .instructions-code {
            color: #999999;
            margin-top: 10px;
        }

        @media (prefers-reduced-motion: reduce) {
            .segment {
                transition: none;
            }
            .plane-icon svg {
                transition: none;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        let flights = [];

        function formatAltitude(alt) {
            return Math.round(alt).toLocaleString();
        }

        function formatDistance(dist) {
            if (dist < 1) return `${(dist * 1000).toFixed(0)}m`;
            return `${dist.toFixed(1)}km`;
        }

        function createPlaneIcon(heading) {
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('viewBox', '0 0 24 24');
            svg.setAttribute('width', '24');
            svg.setAttribute('height', '24');
            svg.style.transform = `rotate(${heading}deg)`;
            svg.style.transition = 'transform 0.3s ease-out';
            
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d', 'M12 2L4 22h6l2-6 2 6h6L12 2z');
            path.setAttribute('fill', '#FFFFFF');
            path.setAttribute('stroke', '#FFFFFF');
            path.setAttribute('stroke-width', '0.5');
            
            svg.appendChild(path);
            return svg;
        }

        function addFlight(flightData) {
            flights = [...flights, { ...flightData, id: Date.now() }].slice(-2);
            render();
        }

        function clearFlights() {
            flights = [];
            render();
        }

        function addRandomFlight() {
            const callsigns = ['QF', 'JQ', 'VA', 'BA', 'UA', 'NH', 'SQ'];
            const callsign = callsigns[Math.floor(Math.random() * callsigns.length)] + Math.floor(Math.random() * 9000 + 1000);
            
            addFlight({
                callsign: callsign,
                altitude: Math.random() * 35000 + 1000,
                distance: Math.random() * 5,
                heading: Math.random() * 360,
            });
        }

        function render() {
            const root = document.getElementById('root');
            root.innerHTML = '';

            const container = document.createElement('div');
            container.className = 'container';

            if (flights.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'empty-state';
                empty.textContent = 'Waiting for aircraft...';
                container.appendChild(empty);
            } else {
                flights.forEach((flight, idx) => {
                    const row = document.createElement('div');
                    row.className = 'flight-row';

                    // Plane icon
                    const planeDiv = document.createElement('div');
                    planeDiv.className = 'plane-icon';
                    planeDiv.appendChild(createPlaneIcon(flight.heading || 0));
                    row.appendChild(planeDiv);

                    // Callsign
                    const callsignSpan = document.createElement('span');
                    callsignSpan.className = 'segment';
                    callsignSpan.textContent = flight.callsign || '-----';
                    row.appendChild(callsignSpan);

                    // Altitude
                    const altDiv = document.createElement('div');
                    altDiv.className = 'data-label';
                    const altLabel = document.createElement('span');
                    altLabel.className = 'data-label-text';
                    altLabel.textContent = 'ALT';
                    const altValue = document.createElement('span');
                    altValue.className = 'segment';
                    altValue.textContent = formatAltitude(flight.altitude || 0);
                    const altUnit = document.createElement('span');
                    altUnit.className = 'data-label-unit';
                    altUnit.textContent = 'ft';
                    altDiv.appendChild(altLabel);
                    altDiv.appendChild(altValue);
                    altDiv.appendChild(altUnit);
                    row.appendChild(altDiv);

                    // Distance
                    const distDiv = document.createElement('div');
                    distDiv.className = 'data-label';
                    const distLabel = document.createElement('span');
                    distLabel.className = 'data-label-text';
                    distLabel.textContent = 'DIST';
                    const distValue = document.createElement('span');
                    distValue.className = 'segment';
                    distValue.textContent = formatDistance(flight.distance || 0);
                    distDiv.appendChild(distLabel);
                    distDiv.appendChild(distValue);
                    row.appendChild(distDiv);

                    // Heading
                    const hdgDiv = document.createElement('div');
                    hdgDiv.className = 'data-label';
                    const hdgLabel = document.createElement('span');
                    hdgLabel.className = 'data-label-text';
                    hdgLabel.textContent = 'HDG';
                    const hdgValue = document.createElement('span');
                    hdgValue.className = 'segment';
                    hdgValue.textContent = `${Math.round(flight.heading || 0)}°`;
                    hdgDiv.appendChild(hdgLabel);
                    hdgDiv.appendChild(hdgValue);
                    row.appendChild(hdgDiv);

                    container.appendChild(row);
                });
            }

            // Buttons
            const buttonGroup = document.createElement('div');
            buttonGroup.className = 'button-group';
            
            const addBtn = document.createElement('button');
            addBtn.className = 'btn-add';
            addBtn.textContent = '+ Add Flight (Demo)';
            addBtn.addEventListener('click', addRandomFlight);
            
            const clearBtn = document.createElement('button');
            clearBtn.className = 'btn-clear';
            clearBtn.textContent = 'Clear';
            clearBtn.addEventListener('click', clearFlights);
            
            buttonGroup.appendChild(addBtn);
            buttonGroup.appendChild(clearBtn);
            container.appendChild(buttonGroup);

            // Instructions
            const instructions = document.createElement('div');
            instructions.className = 'instructions';
            instructions.innerHTML = `
                <p>To integrate with Home Assistant:</p>
                <p class="instructions-code">
                    POST to window.addFlight(flightData) with:<br />
                    { callsign, altitude, distance, heading }
                </p>
            `;
            container.appendChild(instructions);

            root.appendChild(container);
        }

        // Make addFlight available globally
        window.addFlight = addFlight;

        // Initial render when page loads
        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
