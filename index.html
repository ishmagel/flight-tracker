<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split-Flap Airport Display</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        #root {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .empty-state {
            text-align: center;
            font-size: 1.5rem;
            color: #666666;
            font-family: 'Courier New', monospace;
        }

        .flight-row {
            display: flex;
            align-items: center;
            gap: 20px;
            border-top: 2px solid #FFFFFF;
            border-bottom: 2px solid #FFFFFF;
            padding: 20px 30px;
            background-color: rgba(255, 255, 255, 0.02);
        }

        .plane-icon {
            flex-shrink: 0;
            width: 24px;
            height: 24px;
        }

        .plane-icon svg {
            width: 100%;
            height: 100%;
            transition: transform 0.3s ease-out;
        }

        .segment {
            display: inline-block;
            min-width: 80px;
            text-align: center;
            font-family: 'Courier New', monospace;
            font-size: 2rem;
            font-weight: bold;
            color: #FFFFFF;
            padding: 0 8px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .segment.flipping {
            transform: rotateX(90deg);
            transform-style: preserve-3d;
        }

        .data-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 100px;
        }

        .data-label-text {
            font-size: 0.8rem;
            color: #999999;
            margin-bottom: 5px;
        }

        .data-label-unit {
            font-size: 0.7rem;
            color: #666666;
            margin-top: 5px;
        }

        .button-group {
            margin-top: 60px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 0;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn-add {
            background-color: #FFFFFF;
            color: #000000;
        }

        .btn-add:hover {
            background-color: #CCCCCC;
        }

        .btn-clear {
            background-color: #333333;
            color: #FFFFFF;
            border: 1px solid #FFFFFF;
        }

        .btn-clear:hover {
            background-color: #555555;
        }

        .instructions {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #666666;
            font-family: monospace;
            text-align: center;
            max-width: 600px;
        }

        .instructions p {
            margin: 5px 0;
        }

        .instructions-code {
            color: #999999;
            margin-top: 10px;
        }

        @media (prefers-reduced-motion: reduce) {
            .segment {
                transition: none;
            }
            .plane-icon svg {
                transition: none;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function PlaneIcon({ heading = 0 }) {
            return (
                <div className="plane-icon" style={{ transform: `rotate(${heading}deg)` }}>
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M12 2L4 22h6l2-6 2 6h6L12 2z"
                            fill="#FFFFFF"
                            stroke="#FFFFFF"
                            strokeWidth="0.5"
                        />
                    </svg>
                </div>
            );
        }

        function FlipSegment({ value, isNew }) {
            const [displayValue, setDisplayValue] = useState(value);
            const [isFlipping, setIsFlipping] = useState(false);

            useEffect(() => {
                if (isNew) {
                    setIsFlipping(true);
                    const timer = setTimeout(() => {
                        setDisplayValue(value);
                        setIsFlipping(false);
                    }, 50);
                    return () => clearTimeout(timer);
                }
                setDisplayValue(value);
            }, [value, isNew]);

            return (
                <span className={`segment ${isFlipping ? 'flipping' : ''}`}>
                    {displayValue}
                </span>
            );
        }

        function SplitFlapDisplay() {
            const [flights, setFlights] = useState([]);

            const addFlight = (flightData) => {
                setFlights(prev => {
                    const updated = [...prev, { ...flightData, id: Date.now() }];
                    return updated.slice(-2);
                });
            };

            const formatAltitude = (alt) => {
                return Math.round(alt).toLocaleString();
            };

            const formatDistance = (dist) => {
                if (dist < 1) return `${(dist * 1000).toFixed(0)}m`;
                return `${dist.toFixed(1)}km`;
            };

            const addRandomFlight = () => {
                const callsigns = ['QF', 'JQ', 'VA', 'BA', 'UA', 'NH', 'SQ'];
                const callsign = callsigns[Math.floor(Math.random() * callsigns.length)] + Math.floor(Math.random() * 9000 + 1000);
                
                addFlight({
                    callsign: callsign,
                    altitude: Math.random() * 35000 + 1000,
                    distance: Math.random() * 5,
                    heading: Math.random() * 360,
                });
            };

            // Auto-clear flights after 5 minutes
            useEffect(() => {
                const timer = setInterval(() => {
                    setFlights(prev => {
                        const now = Date.now();
                        return prev.filter(f => now - f.id < 300000);
                    });
                }, 60000);
                return () => clearInterval(timer);
            }, []);

            // Listen for webhook data from Home Assistant
            useEffect(() => {
                window.addFlight = addFlight;
                return () => {
                    delete window.addFlight;
                };
            }, []);

            return (
                <div id="root" style={{ backgroundColor: '#000000', minHeight: '100vh' }}>
                    <div className="container">
                        {flights.length === 0 ? (
                            <div className="empty-state">Waiting for aircraft...</div>
                        ) : (
                            flights.map((flight, idx) => (
                                <div key={flight.id} className="flight-row">
                                    <PlaneIcon heading={flight.heading || 0} />
                                    <FlipSegment
                                        value={flight.callsign || '-----'}
                                        isNew={idx === flights.length - 1}
                                    />
                                    <div className="data-label">
                                        <span className="data-label-text">ALT</span>
                                        <FlipSegment
                                            value={formatAltitude(flight.altitude || 0)}
                                            isNew={idx === flights.length - 1}
                                        />
                                        <span className="data-label-unit">ft</span>
                                    </div>
                                    <div className="data-label">
                                        <span className="data-label-text">DIST</span>
                                        <FlipSegment
                                            value={formatDistance(flight.distance || 0)}
                                            isNew={idx === flights.length - 1}
                                        />
                                    </div>
                                    <div className="data-label">
                                        <span className="data-label-text">HDG</span>
                                        <FlipSegment
                                            value={`${Math.round(flight.heading || 0)}°`}
                                            isNew={idx === flights.length - 1}
                                        />
                                    </div>
                                </div>
                            ))
                        )}
                    </div>

                    <div className="button-group">
                        <button className="btn-add" onClick={addRandomFlight}>
                            + Add Flight (Demo)
                        </button>
                        <button className="btn-clear" onClick={() => setFlights([])}>
                            Clear
                        </button>
                    </div>

                    <div className="instructions">
                        <p>To integrate with Home Assistant:</p>
                        <p className="instructions-code">
                            POST to window.addFlight(flightData) with:<br />
                            &#123; callsign, altitude, distance, heading &#125;
                        </p>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<SplitFlapDisplay />, document.getElementById('root'));
    </script>
</body>
</html>
